<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>HPバー付きインベーダー (25フェーズ)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <h1>INVADER: 25 PHASE SURVIVAL</h1>
        <div class="phase-badge" id="phaseBadge">PHASE 1/25</div>
      </header>

      <section class="hud" aria-label="game status">
        <div class="row">
          <span class="label">PLAYER HP</span>
          <div class="bar"><div id="playerHpBar" class="fill player"></div></div>
          <strong id="playerHpText">100 / 100</strong>
        </div>
        <div class="row">
          <span class="label">CHARGE</span>
          <div class="bar"><div id="chargeBar" class="fill charge"></div></div>
          <strong id="phaseText">PHASE 1 / 25</strong>
        </div>
        <div class="row boss-row" id="bossRow" hidden>
          <span class="label boss-label">BOSS HP</span>
          <div class="bar"><div id="bossHpBar" class="fill boss"></div></div>
          <strong id="bossHpText">-</strong>
        </div>
      </section>

      <canvas id="game" width="960" height="600" aria-label="invader game"></canvas>

      <section class="legend">
        <p class="help">操作: <kbd>←</kbd><kbd>→</kbd> 移動 / <kbd>Space</kbd> 短押し:通常射撃・長押し→離す:溜め攻撃 / <kbd>P</kbd> ポーズ</p>
        <p id="message" class="message">Spaceで開始</p>
      </section>
    </main>
    <script src="game.js"></script>
  </body>
</html>
